    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #050505; color: #ffffff; overflow-x: hidden;
            font-family: 'Inter', sans-serif; cursor: default;

        }
        ::selection { background: #FFD32A; color: #050505; }
        
        .bg-cinematic {

            background-size: 60px 60px;

        }
        
        .bg-glow { background: radial-gradient(circle at 50% 50%, rgba(255, 211, 42, 0.04) 0%, transparent 60%); }
        .bg-grain {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            mix-blend-mode: overlay; pointer-events: none; opacity: 0.4;

        .scene {
            height: 100vh; width: 100vw; position: relative; 
            display: flex; align-items: center; justify-content: center;

        }

        .holo-card {
            background: rgba(16, 16, 16, 0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.05); border-radius: 24px;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .holo-card:hover { border-color: rgba(255, 211, 42, 0.2); transform: translateY(-5px) scale(1.02); box-shadow: 0 20px 40px -10px rgba(255, 211, 42, 0.1); }

        .cursor-blink { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        ::-webkit-scrollbar { display: none; }
        
        .perspective-1000 { perspective: 1000px; }
        .perspective-2000 { perspective: 2000px; }

        .magnetic-btn { transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1); }

        .ripple {
            position: absolute; border-radius: 50%;
            background: rgba(255, 211, 42, 0.3);
            transform: scale(0); animation: rippleAnim 0.6s ease-out forwards;

        @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

        /* ─── Button System ─────────────────────────────────────── */
        .btn-primary {

        .btn-secondary:active { transform: translateY(0); }
        .btn-secondary:focus-visible { outline: 2px solid rgba(255,255,255,0.3); outline-offset: 3px; }

        .btn-ghost {

        .btn-ghost:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .btn-ghost:focus-visible { outline: 2px solid rgba(255,255,255,0.3); outline-offset: 2px; }

        /* ─── Section Heading Pattern ──────────────────────────── */
        .section-header { margin-bottom: 3rem; }
        .section-label {
            display: inline-flex; align-items: center; gap: 0.5rem;
            font-family: '"JetBrains Mono"', monospace; font-size: 0.75rem;

            color: rgba(255,211,42,0.6); margin-bottom: 0.75rem;

            content: ''; display: inline-block; width: 1.5rem; height: 1px;
            background: rgba(255,211,42,0.3);

            font-size: 1.0625rem; line-height: 1.7;

        /* ─── Spacing System ──────────────────────────────────── */
        .section-padding { padding: 6rem 0; }
        @media (min-width: 768px) { .section-padding { padding: 8rem 0; } }
        .content-gap { gap: 1.5rem; }
        @media (min-width: 768px) { .content-gap { gap: 2rem; } }

        /* ─── 3D Card Tilt ───────────────────────────────────── */
        .tilt-3d {
            transform-style: preserve-3d;

        .tilt-3d .tilt-content { transform: translateZ(20px); }
        .tilt-3d .tilt-glow { transform: translateZ(30px); }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
            .cursor-blink { animation: none !important; }
        }

        @media (max-width: 768px) {
            .scene { height: 100vh; min-height: -webkit-fill-available; }
            .text-8xl { font-size: 3rem !important; }
            .text-7xl { font-size: 2.5rem !important; }

            .text-5xl { font-size: 1.8rem !important; }

<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react">
        import React, { useEffect, useRef, useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import gsap from 'gsap';
        import { ScrollTrigger } from 'gsap/ScrollTrigger';
        import Lenis from 'lenis';
        
        gsap.registerPlugin(ScrollTrigger);

        // ─── Lenis ───────────────────────────────────────────────
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            orientation: 'vertical',
            smoothWheel: true,
            wheelMultiplier: 0.8,
            infinite: false,
        });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.lagSmoothing(0);

        // ─── Particle System ─────────────────────────────────────
        const ParticleBackground = () => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let animId, particles = [];
                const PARTICLE_COUNT = 40;
                const CONNECTION_DIST = 120;
                const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                resize();
                window.addEventListener('resize', resize);
                class Particle {
                    constructor() { this.reset(); }
                    reset() {
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * canvas.height;
                        this.size = Math.random() * 1.5 + 0.5;
                        this.speedX = (Math.random() - 0.5) * 0.2;
                        this.speedY = (Math.random() - 0.5) * 0.2;
                        this.opacity = Math.random() * 0.4 + 0.1;
                        this.pulse = Math.random() * Math.PI * 2;
                    }
                    update() {
                        this.x += this.speedX; this.y += this.speedY; this.pulse += 0.01;
                        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
                    }
                    draw() {
                        const o = this.opacity * (0.5 + 0.5 * Math.sin(this.pulse));
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 211, 42, ${o})`;
                        ctx.fill();
                    }
                }
                for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
                const drawConnections = () => {
                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i + 1; j < particles.length; j++) {
                            const dx = particles[i].x - particles[j].x;
                            const dy = particles[i].y - particles[j].y;
                            const dist = dx * dx + dy * dy;
                            if (dist < CONNECTION_DIST * CONNECTION_DIST) {
                                const d = Math.sqrt(dist);
                                ctx.beginPath();
                                ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.strokeStyle = `rgba(255, 211, 42, ${0.03 * (1 - d / CONNECTION_DIST)})`;
                                ctx.lineWidth = 0.5;
                                ctx.stroke();
                            }
                        }
                    }
                };
                const animate = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles.forEach(p => { p.update(); p.draw(); });
                    drawConnections();
                    animId = requestAnimationFrame(animate);
                };
                animate();
                return () => { cancelAnimationFrame(animId); window.removeEventListener('resize', resize); };
            }, []);
            return <canvas ref={canvasRef} id="particle-canvas" />;
        };

        // ─── Micro-interaction hooks ─────────────────────────────
        const useMagnetic = (ref, strength = 0.3) => {
            useEffect(() => {
                const el = ref.current;
                if (!el) return;
                const handleMove = (e) => {
                    const rect = el.getBoundingClientRect();
                    el.style.transform = `translate(${(e.clientX - rect.left - rect.width / 2) * strength}px, ${(e.clientY - rect.top - rect.height / 2) * strength}px)`;
                };
                const handleLeave = () => { el.style.transform = 'translate(0, 0)'; };
                el.addEventListener('mousemove', handleMove);
                el.addEventListener('mouseleave', handleLeave);
                return () => { el.removeEventListener('mousemove', handleMove); el.removeEventListener('mouseleave', handleLeave); };
            }, [ref, strength]);
        };

        const useRipple = (ref) => {
            useEffect(() => {
                const el = ref.current;
                if (!el) return;
                const handleClick = (e) => {
                    const rect = el.getBoundingClientRect();
                    const ripple = document.createElement('span');
                    ripple.className = 'ripple';
                    const size = Math.max(rect.width, rect.height);
                    ripple.style.width = ripple.style.height = size + 'px';
                    ripple.style.left = e.clientX - rect.left - size / 2 + 'px';
                    ripple.style.top = e.clientY - rect.top - size / 2 + 'px';
                    el.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 600);
                };
                el.addEventListener('click', handleClick);
                return () => el.removeEventListener('click', handleClick);
            }, [ref]);
        };

        // ─── Mouse Parallax ─────────────────────────────────────
        const useMouseParallax = (ref, strength = 0.03) => {
            useEffect(() => {
                const el = ref.current;
                if (!el) return;
                const handleMove = (e) => {
                    const x = (e.clientX / window.innerWidth - 0.5) * 2;
                    const y = (e.clientY / window.innerHeight - 0.5) * 2;
                    el.style.transform = `translate(${x * strength * 100}px, ${y * strength * 100}px)`;
                };
                window.addEventListener('mousemove', handleMove, { passive: true });
                return () => window.removeEventListener('mousemove', handleMove);
            }, [ref, strength]);
        };

        // ─── 3D Card Tilt ──────────────────────────────────────
        const useCardTilt = (ref, sensitivity = 10) => {
            useEffect(() => {
                const el = ref.current;
                if (!el) return;
                const handleMove = (e) => {
                    const rect = el.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width - 0.5;
                    const y = (e.clientY - rect.top) / rect.height - 0.5;
                    el.style.transform = `perspective(800px) rotateY(${x * sensitivity}deg) rotateX(${-y * sensitivity}deg)`;
                    el.style.transition = 'transform 0.1s ease-out';
                };
                const handleLeave = () => {
                    el.style.transform = 'perspective(800px) rotateY(0deg) rotateX(0deg)';
                    el.style.transition = 'transform 0.5s ease-out';
                };
                el.addEventListener('mousemove', handleMove, { passive: true });
                el.addEventListener('mouseleave', handleLeave, { passive: true });
                return () => {
                    el.removeEventListener('mousemove', handleMove);
                    el.removeEventListener('mouseleave', handleLeave);
                };
            }, [ref, sensitivity]);
        };

        // ─── Boot Sequence ───────────────────────────────────────
        const BootSequence = () => {
            const [bootComplete, setBootComplete] = useState(false);
            const [showGlitch, setShowGlitch] = useState(false);

        const SceneTutorials = () => {
            const sectionRef = useRef(null);
            const tutorials = [
                { title: "Building Your First AI Agent", time: "15 min", difficulty: "Beginner", color: "from-green-500/20" },
                { title: "Multi-Model Provider Setup", time: "20 min", difficulty: "Intermediate", color: "from-blue-500/20" },
                { title: "Advanced Memory Management", time: "25 min", difficulty: "Advanced", color: "from-purple-500/20" },
                { title: "Deploying to Production", time: "10 min", difficulty: "Beginner", color: "from-primary/20" },

            useEffect(() => {
                const el = sectionRef.current;
                if (!el) return;
                const ctx = gsap.context(() => {
                    gsap.fromTo(el, { scale: 0.8, rotate: -5, opacity: 0 }, { scale: 1, rotate: 0, opacity: 1, duration: 1.2, ease: "power4.out", scrollTrigger: { trigger: el, start: "top 85%", toggleActions: "play none none none" } });

                    <div className="absolute inset-0 bg-cinematic"></div>
                    <div className="relative z-10 max-w-6xl mx-auto px-6 w-full">
                        <h2 className="text-4xl md:text-5xl font-black mb-4 tracking-tight">Learn <span className="text-primary">Zenuxs</span></h2>
                        <p className="text-secondary mb-10">Interactive tutorials that feel like Netflix episodes.</p>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">

                            ))}

                    </div>
                </section>

        };

        // ─── Scene 12: Commands ──────────────────────────────────
        const SceneCommands = () => {
            const sectionRef = useRef(null);
            const [activeCmd, setActiveCmd] = useState(null);
            const commands = [
                { cmd: 'zenuxs init', desc: 'Initialize new project' }, { cmd: 'zenuxs generate', desc: 'Generate components' },
                { cmd: 'zenuxs deploy', desc: 'Deploy to production' }, { cmd: 'zenuxs agent', desc: 'Manage AI agents' },
                { cmd: 'zenuxs provider', desc: 'Configure providers' }, { cmd: 'zenuxs memory', desc: 'Manage context' },
                { cmd: 'zenuxs search', desc: 'Semantic search' }, { cmd: 'zenuxs docs', desc: 'Open documentation' },
            ];
            useEffect(() => {
                const el = sectionRef.current;
                if (!el) return;
                const ctx = gsap.context(() => {
                    gsap.from(".cmd-chip", { scale: 0, opacity: 0, duration: 0.6, stagger: 0.05, ease: "back.out(2)", scrollTrigger: { trigger: el, start: "top 70%", toggleActions: "play none none none" } });
                }, el);
                return () => ctx.revert();
            }, []);
            return (
                <section ref={sectionRef} className="scene relative overflow-hidden">
                    <div className="absolute inset-0 bg-glow bg-grain"></div>
                    <div className="absolute inset-0 bg-cinematic"></div>
                    <div className="relative z-10 max-w-4xl mx-auto px-6 w-full text-center">
                        <h2 className="text-4xl md:text-5xl font-black mb-4 tracking-tight">Commands at your <span className="text-primary">fingertips</span></h2>
                        <p className="text-secondary mb-10">Hover to expand. Click to preview.</p>
                        <div className="flex flex-wrap justify-center gap-3 mb-8">
                            {commands.map((c, i) => (
                                <div key={i} onClick={() => setActiveCmd(activeCmd === i ? null : i)} className="cmd-chip holo-card px-5 py-3 cursor-pointer group relative overflow-hidden">
                                    <div className="flex items-center gap-3">
                                        <span className="text-primary font-mono text-sm">$</span>
                                        <span className="font-mono text-sm text-foreground group-hover:text-primary transition-colors">{c.cmd}</span>
                                        <span className="text-secondary/40 text-xs hidden md:inline">{c.desc}</span>
                                    </div>
                                    {activeCmd === i && (
                                        <div className="mt-3 pt-3 border-t border-border/30 text-left">
                                            <div className="bg-[#09090b] rounded-lg p-3 font-mono text-xs">
                                                <div className="text-primary">❯ {c.cmd} --help</div>
                                                <div className="text-secondary mt-1">{c.desc}</div>
                                                <div className="text-green-400 mt-1">✓ Ready</div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // ─── Scene 13: Blog ──────────────────────────────────────
        const SceneBlog = () => {
            const sectionRef = useRef(null);
            const posts = [
                { title: "The Future of AI-Assisted Development", date: "Mar 15, 2026", readTime: "5 min", tag: "AI" },
                { title: "Introducing Zenuxs v3.0: A New Era", date: "Mar 10, 2026", readTime: "8 min", tag: "Release" },
                { title: "Building Multi-Agent Systems", date: "Mar 5, 2026", readTime: "12 min", tag: "Tutorial" },
            ];
            useEffect(() => {
                const el = sectionRef.current;
                if (!el) return;
                const ctx = gsap.context(() => {
                    gsap.from(".blog-post", { x: -80, opacity: 0, duration: 1, stagger: 0.2, ease: "power3.out", scrollTrigger: { trigger: el, start: "top 60%", toggleActions: "play none none none" } });
                }, el);
                return () => ctx.revert();
            }, []);
            return (
                <section ref={sectionRef} className="scene relative overflow-hidden">
                    <div className="absolute inset-0 bg-glow bg-grain"></div>
                    <div className="absolute inset-0 bg-cinematic"></div>
                    <div className="relative z-10 max-w-5xl mx-auto px-6 w-full">
                        <h2 className="text-4xl md:text-5xl font-black mb-4 tracking-tight">Latest from <span className="text-primary">Zenuxs</span></h2>
                        <p className="text-secondary mb-10">Insights, updates, and deep dives.</p>
                        <div className="space-y-4">
                            {posts.map((post, i) => (
                                <div key={i} className="blog-post holo-card p-6 group cursor-pointer">
                                    <div className="flex items-start justify-between">
                                        <div className="space-y-2">
                                            <div className="flex items-center gap-3">
                                                <span className="text-xs font-mono text-primary bg-primary/10 px-2 py-1 rounded">{post.tag}</span>
                                                <span className="text-xs text-secondary/50">{post.date}</span>
                                                <span className="text-xs text-secondary/50">{post.readTime} read</span>
                                            </div>
                                            <h3 className="text-xl font-bold group-hover:text-primary transition-colors">{post.title}</h3>
                                        </div>
                                        <span className="text-secondary/30 group-hover:text-primary transition-colors text-2xl">→</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // ─── Scene 14: Roadmap ───────────────────────────────────
        const SceneRoadmap = () => {
            const sectionRef = useRef(null);
            const milestones = [
                { label: "v1.0 Launch", status: "completed", date: "2025 Q1" }, { label: "Multi-Provider", status: "completed", date: "2025 Q2" },
                { label: "Agent System", status: "completed", date: "2025 Q3" }, { label: "Memory Layer", status: "in-progress", date: "2025 Q4" },
                { label: "Plugin SDK", status: "future", date: "2026 Q1" }, { label: "Enterprise", status: "future", date: "2026 Q2" },
            ];
            useEffect(() => {
                const el = sectionRef.current;
                if (!el) return;
                const ctx = gsap.context(() => {
                    gsap.from(".roadmap-node", { scale: 0, opacity: 0, duration: 0.8, stagger: 0.15, ease: "back.out(2)", scrollTrigger: { trigger: el, start: "top 70%", toggleActions: "play none none none" } });
                }, el);
                return () => ctx.revert();
            }, []);
            return (
                <section ref={sectionRef} className="scene relative overflow-hidden">
                    <div className="absolute inset-0 bg-glow bg-grain"></div>
                    <div className="absolute inset-0 bg-cinematic"></div>
                    <div className="relative z-10 max-w-5xl mx-auto px-6 w-full">
                        <h2 className="text-4xl md:text-5xl font-black mb-4 tracking-tight">Our <span className="text-primary">Journey</span></h2>
                        <p className="text-secondary mb-12">The path to redefining development.</p>
                        <div className="relative">
                            <div className="absolute left-8 top-0 bottom-0 w-px bg-gradient-to-b from-primary via-primary/50 to-transparent"></div>
                            <div className="space-y-8 pl-16">
                                {milestones.map((m, i) => (
                                    <div key={i} className="roadmap-node relative">
                                        <div className={`absolute -left-8 w-4 h-4 rounded-full border-2 ${m.status === 'completed' ? 'bg-primary border-primary' : m.status === 'in-progress' ? 'bg-primary/50 border-primary animate-pulse' : 'bg-transparent border-secondary/30'}`}></div>
                                        <div className="holo-card p-5">
                                            <div className="flex items-center justify-between">
                                                <div><h3 className="font-semibold">{m.label}</h3><span className="text-xs text-secondary/50 font-mono">{m.date}</span></div>
                                                <span className={`text-xs font-mono px-3 py-1 rounded-full ${m.status === 'completed' ? 'bg-green-500/10 text-green-400' : m.status === 'in-progress' ? 'bg-primary/10 text-primary' : 'bg-secondary/10 text-secondary'}`}>{m.status}</span>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // ─── Scene 15: Changelog ─────────────────────────────────
        const SceneChangelog = () => {
            const sectionRef = useRef(null);
            const changes = [
                { version: "3.0.0", date: "2026-03-10", items: ["Major AI engine rewrite", "New agent orchestration system", "Memory layer v2", "Plugin SDK beta"] },
                { version: "2.5.0", date: "2026-01-15", items: ["Multi-provider support", "Performance improvements", "New CLI commands"] },
                { version: "2.0.0", date: "2025-10-01", items: ["Complete UI overhaul", "Real-time collaboration", "Extended API"] },
            ];
            useEffect(() => {
                const el = sectionRef.current;
                if (!el) return;
                const ctx = gsap.context(() => {
                    gsap.from(".changelog-entry", { y: 40, opacity: 0, duration: 0.8, stagger: 0.2, ease: "power3.out", scrollTrigger: { trigger: el, start: "top 70%", toggleActions: "play none none none" } });
                }, el);
                return () => ctx.revert();
            }, []);
            return (
                <section ref={sectionRef} className="scene relative overflow-hidden">
                    <div className="absolute inset-0 bg-glow bg-grain"></div>
                    <div className="absolute inset-0 bg-cinematic"></div>
                    <div className="relative z-10 max-w-4xl mx-auto px-6 w-full">
                        <h2 className="text-4xl md:text-5xl font-black mb-4 tracking-tight">What's <span className="text-primary">New</span></h2>
                        <p className="text-secondary mb-10">Every update brings us closer to the future.</p>
                        <div className="space-y-4">
                            {changes.map((c, i) => (
                                <div key={i} className="changelog-entry holo-card p-6">
                                    <div className="flex items-center gap-4 mb-4">
                                        <span className="text-lg font-bold text-primary">{c.version}</span>
                                        <span className="text-xs text-secondary/50 font-mono">{c.date}</span>
                                        <div className="flex gap-1 ml-auto">{[0,1,2,3].map(j => <div key={j} className={`w-2 h-2 rounded-full ${j < c.items.length ? 'bg-primary/50' : 'bg-secondary/10'}`}></div>)}</div>
                                    </div>
                                    <ul className="space-y-2">{c.items.map((item, j) => <li key={j} className="flex items-center gap-3 text-sm text-secondary"><span className="w-1.5 h-1.5 rounded-full bg-primary/30 shrink-0"></span>{item}</li>)}</ul>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // ─── Scene 16: Community ─────────────────────────────────
        const SceneCommunity = () => {
            const sectionRef = useRef(null);
            const platforms = [
                { name: "Discord", icon: "💬", members: "12.4k", color: "from-indigo-500/20" },
                { name: "GitHub", icon: "⭐", members: "8.2k", color: "from-gray-500/20" },
                { name: "Twitter", icon: "𝕏", members: "15.1k", color: "from-blue-500/20" },
            ];
            useEffect(() => {
                const el = sectionRef.current;
                if (!el) return;
                const ctx = gsap.context(() => {
                    gsap.from(".community-card", { scale: 0, rotate: 180, opacity: 0, duration: 1, stagger: 0.2, ease: "back.out(2)", scrollTrigger: { trigger: el, start: "top 70%", toggleActions: "play none none none" } });
                }, el);
                return () => ctx.revert();
            }, []);
            return (
                <section ref={sectionRef} className="scene relative overflow-hidden">
                    <div className="absolute inset-0 bg-glow bg-grain"></div>
                    <div className="absolute inset-0 bg-cinematic"></div>
                    <div className="relative z-10 max-w-4xl mx-auto px-6 w-full text-center">
                        <h2 className="text-4xl md:text-5xl font-black mb-4 tracking-tight">Join the <span className="text-primary">Community</span></h2>
                        <p className="text-secondary mb-12">Connect with developers building the future.</p>
                        <div className="flex justify-center gap-6 flex-wrap">
                            {platforms.map((p, i) => (
                                <div key={i} className="community-card holo-card p-8 w-56 group cursor-pointer">
                                    <div className={`w-20 h-20 mx-auto mb-4 rounded-2xl bg-gradient-to-br ${p.color} flex items-center justify-center text-2xl group-hover:scale-110 transition-transform`}>{p.icon}</div>
                                    <h3 className="font-bold text-lg mb-1">{p.name}</h3>
                                    <p className="text-secondary text-sm font-mono">{p.members} members</p>
                                    <div className="mt-4 w-8 h-[2px] bg-primary/30 mx-auto group-hover:w-16 transition-all"></div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // ─── Scene 17: Contact ───────────────────────────────────
        const SceneContact = () => {
            const sectionRef = useRef(null);
            const [message, setMessage] = useState("");
            const [sending, setSending] = useState(false);
            const [sent, setSent] = useState(false);
            const [progress, setProgress] = useState(0);
            const handleSend = () => {
                if (!message.trim()) return;
                setSending(true); setProgress(0);
                const interval = setInterval(() => { setProgress(prev => { if (prev >= 100) { clearInterval(interval); setSending(false); setSent(true); return 100; } return prev + 5; }); }, 100);
            };
            useEffect(() => {
                const el = sectionRef.current;
                if (!el) return;
                const ctx = gsap.context(() => {
                    gsap.fromTo(".monitor", { scale: 0.5, y: 100, opacity: 0, rotateX: 20 }, { scale: 1, y: 0, opacity: 1, rotateX: 0, duration: 1.2, ease: "power3.out", scrollTrigger: { trigger: el, start: "top 85%", toggleActions: "play none none none" } });
                }, el);
                return () => ctx.revert();
            }, []);
            return (
                <section ref={sectionRef} className="scene relative overflow-hidden bg-[#09090b]">
                    <div className="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(255,211,42,0.03),transparent_60%)]"></div>
                    <div className="absolute inset-0 terminal-grid"></div>
                    <div className="relative z-10 max-w-4xl mx-auto px-6 w-full">
                        <div className="monitor holo-card p-8 md:p-12">
                            <div className="flex items-center gap-3 mb-6 border-b border-border/30 pb-4">
                                <div className="w-3 h-3 rounded-full bg-red-500/50"></div>
                                <div className="w-3 h-3 rounded-full bg-yellow-500/50"></div>
                                <div className="w-3 h-3 rounded-full bg-green-500/50"></div>
                                <span className="text-secondary/40 text-xs font-mono ml-2">zenuxs-workstation — contact</span>
                            </div>
                            <h2 className="text-3xl md:text-4xl font-black mb-2">Let's <span className="text-primary">build</span> together</h2>
                            <p className="text-secondary mb-8 text-sm">Send a message. We'll respond in milliseconds.</p>
                            <div className="space-y-4">
                                <div className="flex gap-4">
                                    <div className="flex-1"><label className="text-xs text-secondary/50 font-mono block mb-2">Name</label><input type="text" placeholder="Your name" className="w-full bg-[#09090b] border border-border/30 rounded-xl px-4 py-3 text-sm text-foreground outline-none focus:border-primary/50 transition-colors font-mono" /></div>
                                    <div className="flex-1"><label className="text-xs text-secondary/50 font-mono block mb-2">Email</label><input type="email" placeholder="you@example.com" className="w-full bg-[#09090b] border border-border/30 rounded-xl px-4 py-3 text-sm text-foreground outline-none focus:border-primary/50 transition-colors font-mono" /></div>
                                </div>
                                <div><label className="text-xs text-secondary/50 font-mono block mb-2">Message</label><textarea placeholder="Type your message..." rows="4" value={message} onChange={(e) => setMessage(e.target.value)} className="w-full bg-[#09090b] border border-border/30 rounded-xl px-4 py-3 text-sm text-foreground outline-none focus:border-primary/50 transition-colors font-mono resize-none"></textarea></div>
                                <button onClick={handleSend} disabled={sending || sent} className="w-full bg-primary text-background py-4 rounded-xl font-semibold hover:scale-[1.02] active:scale-[0.98] transition-all shadow-[0_0_30px_rgba(255,211,42,0.2)] relative overflow-hidden disabled:opacity-50">
                                    {sending ? (
                                        <div className="space-y-1">
                                            <div className="flex items-center justify-center gap-2"><span className="w-4 h-4 border-2 border-background border-t-transparent rounded-full animate-spin"></span>Deploying...</div>
                                            <div className="w-full bg-background/20 rounded-full h-1"><div className="bg-background h-1 rounded-full transition-all" style={{width: `${progress}%`}}></div></div>
                                        </div>
                                    ) : sent ? <span>✓ Message deployed successfully</span> : <span>Send Message</span>}
                                </button>
                                {sent && <div className="p-4 bg-green-500/10 border border-green-500/20 rounded-xl text-center"><p className="text-green-400 font-mono text-sm">✓ Uploading... Testing... Deploying... Done.</p><p className="text-secondary/50 text-xs mt-1">We'll be in touch shortly.</p></div>}
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // ─── Scene 18: Credits ───────────────────────────────────
        const SceneCredits = () => {
            const sectionRef = useRef(null);
            const credits = [
                { role: "Creative Direction", name: "Zenuxs Team" }, { role: "Design & Engineering", name: "Zenuxs Code" },
                { role: "AI Architecture", name: "Zenuxs AI" }, { role: "Special Thanks", name: "OpenAI, Anthropic, Google" },
                { role: "Powered by", name: "AI · Code · Innovation" },
            ];
            useEffect(() => {
                const el = sectionRef.current;
                if (!el) return;
                const ctx = gsap.context(() => {
                    gsap.fromTo(".credits-content", { y: '30%', opacity: 0 }, { y: '-10%', opacity: 1, duration: 2, ease: "power2.out", scrollTrigger: { trigger: el, start: "top 85%", toggleActions: "play none none none" } });
                    gsap.to(".credit-particle", { opacity: 0, duration: 2, stagger: 0.1, ease: "power2.out", scrollTrigger: { trigger: el, start: "top 80%", toggleActions: "play none none none" } });
                }, el);
                return () => ctx.revert();
            }, []);
            return (
                <section ref={sectionRef} className="scene relative flex flex-col items-center justify-center bg-[#050505]">
                    <div className="absolute inset-0 bg-grain"></div>
                    {[...Array(20)].map((_, i) => <div key={i} className="credit-particle absolute w-1 h-1 bg-primary/30 rounded-full" style={{ left: `${Math.random() * 100}%`, top: `${Math.random() * 100}%` }}></div>)}
                    <div className="credits-content text-center space-y-8 z-10">
                        <div className="space-y-4">
                            <h2 className="text-5xl md:text-7xl font-black tracking-tight text-white/80">READY TO BUILD?</h2>
                            <div className="h-6 w-3 bg-primary mx-auto cursor-blink"></div>
                        </div>
                        <div className="space-y-4 mt-16">{credits.map((c, i) => <div key={i} className="space-y-1"><p className="text-xs text-secondary/40 tracking-[0.3em] uppercase font-mono">{c.role}</p><p className="text-lg text-white/60 font-light">{c.name}</p></div>)}</div>
                        <div className="mt-12 pt-8 border-t border-border/20"><p className="text-xs text-secondary/30 font-mono tracking-widest">© 2026 ZENUXS.CODE — THE AI OPERATING SYSTEM</p></div>
                    </div>
                </section>
            );
        };

        // ─── App Assembly ────────────────────────────────────────
        const App = () => (
            <div className="relative min-h-screen">
                <ParticleBackground />
                <BootSequence />
                <SceneHero />
                <SceneFeatures />
                <SceneTerminal />
                <SceneAI />
                <SceneComparison />
                <SceneInstallation />
                <SceneCLI />
                <SceneArchitecture />
                <SceneScreenshots />
                <SceneDocs />
                <SceneTutorials />
                <SceneCommands />
                <SceneBlog />
                <SceneRoadmap />
                <SceneChangelog />
                <SceneCommunity />
                <SceneContact />
                <SceneCredits />
            </div>
        );

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
